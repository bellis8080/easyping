<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- EasyPing Logo Style - Blue gradient with orange ring -->
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Orange outer ring -->
  <circle cx="20" cy="20" r="19" fill="none" stroke="#F97316" stroke-width="2"/>

  <!-- Blue gradient background -->
  <circle cx="20" cy="20" r="17" fill="url(#blueGradient)"/>

  <!-- Radio icon (simplified) -->
  <!-- Outer arc -->
  <path d="M12 14C14.5 11.5 18 10 20 10C22 10 25.5 11.5 28 14" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Middle arc -->
  <path d="M14.5 17C16 15 18 14 20 14C22 14 24 15 25.5 17" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Center dot -->
  <circle cx="20" cy="22" r="3" fill="white"/>
  <!-- Base line -->
  <line x1="20" y1="25" x2="20" y2="30" stroke="white" stroke-width="2" stroke-linecap="round"/>
</svg>
