version: '3.8'

services:
  # PostgreSQL database with pgvector extension
  postgres:
    image: supabase/postgres:15.1.0.147
    container_name: easyping-postgres
    restart: unless-stopped
    ports:
      - "54325:5432"  # Expose for admin access (different from local Supabase on 54322)
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - easyping-network

  # Supabase Auth (GoTrue)
  gotrue:
    image: supabase/gotrue:v2.99.0
    container_name: easyping-gotrue
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${NEXT_PUBLIC_APP_URL:-https://localhost}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-postgres}?search_path=auth
      GOTRUE_SITE_URL: ${GOTRUE_SITE_URL:-https://localhost}
      GOTRUE_URI_ALLOW_LIST: ${GOTRUE_URI_ALLOW_LIST:-*}
      GOTRUE_DISABLE_SIGNUP: ${GOTRUE_DISABLE_SIGNUP:-false}
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: ${GOTRUE_JWT_EXP:-3600}
      GOTRUE_JWT_SECRET: ${GOTRUE_JWT_SECRET}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: ${GOTRUE_EXTERNAL_EMAIL_ENABLED:-true}
      GOTRUE_MAILER_AUTOCONFIRM: ${GOTRUE_MAILER_AUTOCONFIRM:-false}
      GOTRUE_SMTP_ADMIN_EMAIL: ${GOTRUE_SMTP_ADMIN_EMAIL:-admin@example.com}
      GOTRUE_SMTP_HOST: ${GOTRUE_SMTP_HOST:-}
      GOTRUE_SMTP_PORT: ${GOTRUE_SMTP_PORT:-587}
      GOTRUE_SMTP_USER: ${GOTRUE_SMTP_USER:-}
      GOTRUE_SMTP_PASS: ${GOTRUE_SMTP_PASS:-}
      GOTRUE_SMTP_SENDER_NAME: ${GOTRUE_SMTP_SENDER_NAME:-EasyPing}
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: ${GOTRUE_EXTERNAL_GOOGLE_ENABLED:-false}
      GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID: ${GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID:-}
      GOTRUE_EXTERNAL_GOOGLE_SECRET: ${GOTRUE_EXTERNAL_GOOGLE_SECRET:-}
      GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI: ${GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI:-http://localhost/auth/v1/callback}
    networks:
      - easyping-network

  # PostgREST API
  postgrest:
    image: postgrest/postgrest:v11.2.0
    container_name: easyping-postgrest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-postgres}
      PGRST_DB_SCHEMAS: ${PGRST_DB_SCHEMAS:-public}
      PGRST_DB_ANON_ROLE: ${PGRST_DB_ANON_ROLE:-anon}
      PGRST_JWT_SECRET: ${GOTRUE_JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${GOTRUE_JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: ${GOTRUE_JWT_EXP:-3600}
    networks:
      - easyping-network

  # pg-meta - Database metadata API for Supabase Studio
  meta:
    image: supabase/postgres-meta:v0.68.0
    container_name: easyping-meta
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: postgres
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: ${POSTGRES_DB:-postgres}
      PG_META_DB_USER: postgres
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - easyping-network

  # Supabase Studio - Web UI for database management (Docker deployment only)
  # Access at http://localhost:8001
  studio:
    image: supabase/studio:latest
    container_name: easyping-studio
    restart: unless-stopped
    ports:
      - "8001:3000"
    depends_on:
      postgres:
        condition: service_healthy
      meta:
        condition: service_started
    environment:
      # pg-meta API endpoint - CRITICAL for Studio to work
      STUDIO_PG_META_URL: http://meta:8080

      # Supabase project configuration
      SUPABASE_URL: http://caddy:80/api
      SUPABASE_PUBLIC_URL: ${NEXT_PUBLIC_SUPABASE_URL:-https://localhost/api}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}

      # Project display names
      DEFAULT_ORGANIZATION_NAME: EasyPing
      DEFAULT_PROJECT_NAME: EasyPing Docker

      # Auth service URL
      GOTRUE_URL: http://gotrue:9999

      # PostgreSQL connection details
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

      # Database connection settings for pg-meta
      PG_META_DB_HOST: postgres
      PG_META_DB_NAME: ${POSTGRES_DB:-postgres}
      PG_META_DB_USER: postgres
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
      PG_META_DB_PORT: 5432
    networks:
      - easyping-network

  # Supabase Storage API (DISABLED - complex initialization, enable later)
  # storage:
  #   image: supabase/storage-api:v0.40.4
  #   container_name: easyping-storage
  #   restart: unless-stopped
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     postgrest:
  #       condition: service_started
  #   environment:
  #     ANON_KEY: ${SUPABASE_ANON_KEY}
  #     SERVICE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
  #     POSTGREST_URL: http://postgrest:3000
  #     PGRST_JWT_SECRET: ${GOTRUE_JWT_SECRET}
  #     DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-postgres}
  #     FILE_SIZE_LIMIT: ${FILE_SIZE_LIMIT:-52428800}
  #     STORAGE_BACKEND: ${STORAGE_BACKEND:-file}
  #     FILE_STORAGE_BACKEND_PATH: /var/lib/storage
  #     TENANT_ID: stub
  #     REGION: stub
  #     GLOBAL_S3_BUCKET: stub
  #     ENABLE_IMAGE_TRANSFORMATION: "true"
  #     IMGPROXY_URL: http://imgproxy:8080
  #   volumes:
  #     - storage_data:/var/lib/storage
  #   networks:
  #     - easyping-network

  # Supabase Realtime (DISABLED - complex initialization, enable later)
  # realtime:
  #   image: supabase/realtime:v2.25.35
  #   container_name: easyping-realtime
  #   restart: unless-stopped
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   environment:
  #     PORT: 4000
  #     DB_HOST: postgres
  #     DB_PORT: 5432
  #     DB_USER: postgres
  #     DB_PASSWORD: ${POSTGRES_PASSWORD}
  #     DB_NAME: ${POSTGRES_DB:-postgres}
  #     DB_AFTER_CONNECT_QUERY: 'SET search_path TO _realtime'
  #     DB_ENC_KEY: supabaserealtime
  #     API_JWT_SECRET: ${GOTRUE_JWT_SECRET}
  #     FLY_ALLOC_ID: stub
  #     FLY_APP_NAME: stub
  #     SECRET_KEY_BASE: ${REALTIME_SECRET_KEY_BASE:-UpNVntn3cDxHJpq99YMc1T1AQgQpc8kfYTuRgBiYa3OFWdYdNvE7OvkbokLdcNYP}
  #     ERL_AFLAGS: -proto_dist inet_tcp
  #     ENABLE_TAILSCALE: "false"
  #     DNS_NODES: "''"
  #   command: >
  #     sh -c "/app/bin/migrate && /app/bin/realtime eval 'Realtime.Release.seeds(Realtime.Repo)' && /app/bin/server"
  #   networks:
  #     - easyping-network

  # Next.js Web Application
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-https://localhost/api}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://localhost}
    container_name: easyping-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      postgrest:
        condition: service_started
      gotrue:
        condition: service_started
      # storage:
      #   condition: service_started
      # realtime:
      #   condition: service_started
    environment:
      NODE_ENV: production
      # Public URL for client-side (browser) - goes through Caddy with HTTPS
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-https://localhost/api}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      # Internal URL for server-side - goes through Caddy on HTTP port 80 (same routing, no SSL)
      SUPABASE_URL: http://caddy:80/api
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://localhost}
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-postgres}
    networks:
      - easyping-network

  # Caddy Reverse Proxy
  caddy:
    image: caddy:2-alpine
    container_name: easyping-caddy
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      TLS_EMAIL: ${TLS_EMAIL:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - easyping-network

# Named volumes for persistent data
volumes:
  postgres_data:
    driver: local
  storage_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local

# Network for service communication
networks:
  easyping-network:
    driver: bridge
