# Security Assessment
security_notes:
  - API validates user role before allowing private visibility (403 if end_user attempts private)
  - Server-side filtering ensures end users never receive private messages
  - Realtime subscriptions filter private messages client-side (per RLS/Realtime limitation)
  - System messages explicitly set visibility='public' for status transitions

