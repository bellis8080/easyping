# Acceptance Criteria Assessment
acceptance_criteria:
  - id: AC1
    description: "KB dashboard shows 'Popular Articles' section (top 10 by views)"
    status: PASS
    evidence: |
      - API returns `popularArticles` array ordered by view_count DESC, LIMIT 10
      - KBAnalyticsTab.tsx renders table with Rank, Title (clickable), Category, Views, Helpful %
      - Articles link to /kb/article/[slug] for detailed view

  - id: AC2
    description: "'Most Helpful' section shows articles with highest thumbs-up ratio"
    status: PASS
    evidence: |
      - API returns `mostHelpful` array with helpfulRatio calculation
      - Only includes articles with >= 5 feedback votes (avoids statistical noise)
      - Calculates: helpful_count / (helpful_count + not_helpful_count) * 100
      - KBAnalyticsTab displays in "Most Helpful" section with percentage

  - id: AC3
    description: "'Least Helpful' section shows articles with low ratings (need improvement)"
    status: PASS
    evidence: |
      - API returns `leastHelpful` array (bottom 10 by helpful ratio, 5+ votes)
      - KBAnalyticsTab shows "Needs Improvement" section
      - Articles with <50% helpfulness highlighted in amber/red styling

  - id: AC4
    description: "Article creation timeline chart (articles published per week/month)"
    status: PASS
    evidence: |
      - API returns `timeline` array with date periods and counts
      - Groups by day (7d) or week (30d/90d) based on date range
      - KBAnalyticsTab renders bar chart with orange gradient
      - Shows articles published count per time period

  - id: AC5
    description: "Category breakdown chart (articles by category)"
    status: PASS
    evidence: |
      - API returns `categoryBreakdown` with category name, article count, percentage
      - KBAnalyticsTab renders horizontal progress bars
      - Shows count and percentage for each category
      - Includes "Uncategorized" for articles without category

  - id: AC6
    description: "Export KB analytics to CSV"
    status: PASS
    evidence: |
      - Export endpoint at /api/kb/analytics/export/route.ts
      - Manager/owner role check before allowing export
      - Returns CSV with 4 sections: Summary, Popular Articles (Top 20), Category Breakdown, All Articles
      - Proper Content-Disposition header for file download
      - "Export as CSV" button in KBAnalyticsTab with loading spinner

